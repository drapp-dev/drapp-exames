<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DrApp – Envio de Pedido Médico</title>
  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #f0f6fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .box {
      text-align: center;
      color: #003570;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #d0e6f7;
      border-top-color: #006dc7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 16px; margin: 0; }
  </style>
  <script>
    (function () {
      var d = new URLSearchParams(window.location.search).get('d');
      if (d) {
        window.location.replace(
          'https://script.google.com/macros/s/AKfycbxyeHFlUzJ6sQCEjFdgviwtdpTJ9zwxVipswMIWj1IPzWm00zRBgVFAHy-B0ajaIyNGQg/exec?action=upload&deal=' + encodeURIComponent(d)
        );
      } else {
        window.location.replace('https://drapp.com.br');
      }
    })();
  </script>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Redirecionando…</p>
  </div>
</body>
</html>
